name: Deploy to GitHub Pages

# Auto-deploy on every push to the default branch (and on-demand from the Actions tab).
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time. Do NOT cancel an in-progress deploy; let
# production deployments finish (queued runs between the in-progress and the
# latest are skipped).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute base path
        id: basepath
        # Next.js needs basePath WITHOUT a trailing slash (e.g. "/my-repo"), and
        # an empty string for a <user>.github.io repo served at the domain root.
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static export
        env:
          BUILD_STATIC: "true"
          PAGES_BASE_PATH: ${{ steps.basepath.outputs.path }}
        run: npm run build

      - name: Disable Jekyll
        # Without this, GitHub Pages' Jekyll ignores the _next/ folder.
        # (Next static export already writes out/404.html for the not-found page.)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
